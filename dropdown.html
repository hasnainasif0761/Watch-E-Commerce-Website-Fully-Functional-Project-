<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navbar Dropdown</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<!-- Navbar -->
<nav class="bg-black text-white">
<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

<h1 class="text-xl font-bold">MyStore</h1>

<ul class="flex gap-8">

<li><a href="#">Home</a></li>

<!-- Dropdown -->
<li class="relative group">

<a href="#" class="flex items-center gap-1">
Products
</a>

<!-- Dropdown Menu -->
<ul class="absolute left-0 top-8 bg-white text-black w-40 shadow-lg
opacity-0 invisible translate-y-3
group-hover:opacity-100 group-hover:visible group-hover:translate-y-0
transition-all duration-300">

<li class="px-4 py-2 hover:bg-gray-100 cursor-pointer">Watch</li>
<li class="px-4 py-2 hover:bg-gray-100 cursor-pointer">Shoes</li>
<li class="px-4 py-2 hover:bg-gray-100 cursor-pointer">Laptop</li>
<li class="px-4 py-2 hover:bg-gray-100 cursor-pointer">Accessories</li>

</ul>

</li>

<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>

</ul>

</div>
</nav>

</body>
</html>
